name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Local-root dependencies intentionally mirror the west workspace. CI
      # materializes the same sibling layout before Clojure builds its classpath.
      - name: Checkout KAMI shader dependency workspace
        run: |
          for repo in wgsl expr; do
            git clone --depth 1 "https://github.com/kotoba-lang/${repo}.git" "../${repo}"
          done
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test

      - run: clojure -M:lint
